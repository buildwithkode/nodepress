# NodePress — Production Docker Compose
# Usage: docker-compose -f docker-compose.prod.yml up -d
#
# Required .env variables (auto-generated by: npx nodepress new <name>):
#   DB_PASSWORD, JWT_SECRET, SITE_URL, CORS_ORIGIN

version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: nodepress_db
    environment:
      POSTGRES_DB:       nodepress
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── NestJS Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nodepress_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL:  "postgresql://postgres:${DB_PASSWORD}@db:5432/nodepress"
      PORT:          3000
      JWT_SECRET:    ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN:   ${CORS_ORIGIN:-http://localhost}
      APP_URL:       ${APP_URL:-http://localhost:3000}
      SITE_URL:      ${SITE_URL:-http://localhost}
      # Storage (uncomment for S3):
      # STORAGE_DRIVER:         s3
      # STORAGE_S3_BUCKET:      ${STORAGE_S3_BUCKET}
      # STORAGE_S3_REGION:      ${STORAGE_S3_REGION}
      # STORAGE_S3_ACCESS_KEY:  ${STORAGE_S3_ACCESS_KEY}
      # STORAGE_S3_SECRET_KEY:  ${STORAGE_S3_SECRET_KEY}
      # STORAGE_S3_ENDPOINT:    ${STORAGE_S3_ENDPOINT}
      # STORAGE_S3_PUBLIC_URL:  ${STORAGE_S3_PUBLIC_URL}
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    networks:
      - internal
    command: >
      sh -c "npx prisma migrate deploy && node dist/main.js"

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:3000
    container_name: nodepress_frontend
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:3000
    restart: unless-stopped
    networks:
      - internal

  # ── nginx reverse proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: nodepress_nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy.conf:/etc/nginx/conf.d/proxy.conf:ro
      # SSL certificates (mount after running certbot):
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped
    networks:
      - internal
      - external

networks:
  internal:
    driver: bridge
  external:
    driver: bridge

volumes:
  postgres_data:
  uploads:
