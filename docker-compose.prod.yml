# NodePress — Production Docker Compose
# Usage: docker-compose -f docker-compose.prod.yml up -d
#
# Required .env variables (auto-generated by: npx nodepress new <name>):
#   DB_PASSWORD, JWT_SECRET, SITE_URL, CORS_ORIGIN

version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: nodepress_db
    environment:
      POSTGRES_DB:       nodepress
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512m

  # ── PgBouncer (connection pooler) ───────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:1.23.1
    container_name: nodepress_pgbouncer
    environment:
      DB_HOST:     db
      DB_PORT:     5432
      DB_USER:     postgres
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME:     nodepress
      POOL_MODE:   transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 64m

  # ── NestJS Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nodepress_backend
    depends_on:
      pgbouncer:
        condition: service_started
      db:
        condition: service_healthy
    environment:
      # Route through PgBouncer for pooled connections
      DATABASE_URL:  "postgresql://postgres:${DB_PASSWORD}@pgbouncer:5432/nodepress"
      # Use direct DB connection for migrations (PgBouncer transaction mode blocks DDL)
      DIRECT_URL:    "postgresql://postgres:${DB_PASSWORD}@db:5432/nodepress"
      PORT:          3000
      JWT_SECRET:    ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN:   ${CORS_ORIGIN:-http://localhost}
      APP_URL:       ${APP_URL:-http://localhost:3000}
      SITE_URL:      ${SITE_URL:-http://localhost}
      # Storage (uncomment for S3):
      # STORAGE_DRIVER:         s3
      # STORAGE_S3_BUCKET:      ${STORAGE_S3_BUCKET}
      # STORAGE_S3_REGION:      ${STORAGE_S3_REGION}
      # STORAGE_S3_ACCESS_KEY:  ${STORAGE_S3_ACCESS_KEY}
      # STORAGE_S3_SECRET_KEY:  ${STORAGE_S3_SECRET_KEY}
      # STORAGE_S3_ENDPOINT:    ${STORAGE_S3_ENDPOINT}
      # STORAGE_S3_PUBLIC_URL:  ${STORAGE_S3_PUBLIC_URL}
      # Email (for password reset):
      # SMTP_HOST: ${SMTP_HOST}
      # SMTP_PORT: ${SMTP_PORT:-587}
      # SMTP_USER: ${SMTP_USER}
      # SMTP_PASS: ${SMTP_PASS}
      # SMTP_FROM: ${SMTP_FROM}
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    networks:
      - internal
    command: >
      sh -c "npx prisma migrate deploy && node dist/main.js"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:3000
    container_name: nodepress_frontend
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:3000
    restart: unless-stopped
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256m

  # ── nginx reverse proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: nodepress_nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy.conf:/etc/nginx/conf.d/proxy.conf:ro
      # SSL certificates (mount after running certbot):
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped
    networks:
      - internal
      - external
    deploy:
      resources:
        limits:
          memory: 64m

  # ── Automated backups ─────────────────────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    container_name: nodepress_backup
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD:   ${DB_PASSWORD}
      POSTGRES_USER: postgres
      POSTGRES_HOST: db
      POSTGRES_DB:   nodepress
      # Optional: set to upload backups to S3
      # BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET}
      # AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      # AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      # AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    volumes:
      - backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
      - ./scripts/backup-crontab:/etc/crontabs/root:ro
    entrypoint: ["sh", "-c", "chmod +x /backup.sh && crond -f -l 8"]
    command: []
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64m

networks:
  internal:
    driver: bridge
  external:
    driver: bridge

volumes:
  postgres_data:
  uploads:
  backups:
