name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend (type-check)
    runs-on: ubuntu-latest

    env:
      DATABASE_URL:   postgresql://postgres:testpassword@localhost:5432/nodepress_test
      JWT_SECRET:     ci_test_secret_not_used_in_production_64chars_xxxxxxxxxxxxx
      CORS_ORIGIN:    http://localhost:3000
      NODE_ENV:       test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Type-check
        working-directory: backend
        run: npx tsc --noEmit

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (type-check · build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        env:
          BACKEND_URL: http://localhost:3000
        run: npm run build

  # ── CLI ────────────────────────────────────────────────────────────────────
  cli:
    name: CLI (syntax check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Syntax check
        run: node --check cli/bin/nodepress.js && node --check cli/src/new.js

      - name: Version check
        run: node cli/bin/nodepress.js --version
