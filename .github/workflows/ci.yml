name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Backend ───────────────────────────────────────────────────────────────────
jobs:
  backend:
    name: Backend (type-check · unit · e2e)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       nodepress_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL:   postgresql://postgres:testpassword@localhost:5432/nodepress_test
      JWT_SECRET:     ci_test_secret_not_used_in_production_64chars_xxxxxxxxxxxxx
      JWT_EXPIRES_IN: 7d
      PORT:           3001
      APP_URL:        http://localhost:3001
      SITE_URL:       http://localhost:3001
      CORS_ORIGIN:    http://localhost:3000
      NODE_ENV:       test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Type-check
        working-directory: backend
        run: node_modules/.bin/tsc --noEmit

      - name: Apply migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Unit tests
        working-directory: backend
        run: npm test -- --coverage --coverageReporters=text-summary

      - name: Integration (e2e) tests
        working-directory: backend
        run: npm run test:e2e

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

# ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (type-check · build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: node_modules/.bin/tsc --noEmit

      - name: Build
        working-directory: frontend
        env:
          BACKEND_URL: http://localhost:3000
        run: npm run build

# ── CLI ───────────────────────────────────────────────────────────────────────
  cli:
    name: CLI (syntax check)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Syntax check CLI entry point
        run: node --check cli/bin/nodepress.js && node --check cli/src/new.js

      - name: Verify --version works
        run: node cli/bin/nodepress.js --version
