# Shared proxy rules — included by both HTTP and HTTPS server blocks

client_max_body_size 15M;  # Must be >= MEDIA_MAX_SIZE (default 10MB + headers)

# ── Block external access to Prometheus metrics endpoint ─────────────────────
# Prometheus scrapes backend:3000 directly inside the Docker network.
# This prevents the metrics endpoint from being reachable from the internet.
location = /api/metrics {
    deny all;
    return 403;
}

# ── WebSocket (Socket.IO realtime gateway) ────────────────────────────────────
location /api/realtime {
    proxy_pass         http://backend:3000/api/realtime;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;  # keep WS connections alive
}

# ── API requests → NestJS backend ─────────────────────────────────────────────
location /api/ {
    limit_req zone=api burst=20 nodelay;

    proxy_pass         http://backend:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
}

# ── Upload endpoint (larger body, stricter rate) ───────────────────────────────
location /api/media/upload {
    limit_req zone=upload burst=5 nodelay;

    proxy_pass         http://backend:3000/api/media/upload;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}

# ── Uploaded files — served directly / cached ─────────────────────────────────
location /uploads/ {
    proxy_pass         http://backend:3000/uploads/;
    proxy_cache_valid  200 7d;
    add_header         Cache-Control "public, max-age=604800, immutable";
    proxy_set_header   Host $host;
}

# ── Grafana (served at /grafana/) ─────────────────────────────────────────────
location = /grafana {
    return 301 /grafana/;
}
location /grafana/ {
    proxy_pass         http://grafana:3000/grafana/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
}

# ── Swagger UI ────────────────────────────────────────────────────────────────
location /api-docs {
    proxy_pass         http://backend:3000/api-docs;
    proxy_set_header   Host $host;
}

# ── Sitemap / robots served from backend ─────────────────────────────────────
location ~ ^/(sitemap\.xml|robots\.txt)$ {
    proxy_pass         http://backend:3000/$1;
    proxy_set_header   Host $host;
    add_header         Cache-Control "public, max-age=3600";
}

# ── Everything else → Next.js frontend ───────────────────────────────────────
location / {
    proxy_pass         http://frontend:3001;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
}

# ── Security headers ──────────────────────────────────────────────────────────
add_header X-Frame-Options          "SAMEORIGIN"   always;
add_header X-Content-Type-Options   "nosniff"      always;
add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
