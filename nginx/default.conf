# ── NodePress nginx reverse proxy ─────────────────────────────────────────────
# Replace YOUR_DOMAIN with your actual domain (e.g. mysite.com)
# For SSL: uncomment the HTTPS server block and run certbot

# Gzip compression
gzip on;
gzip_vary on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
gzip_min_length 1024;

# Rate limiting zones (extra layer on top of NestJS throttler)
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;

# ── HTTP (redirects to HTTPS in production) ───────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Uncomment once SSL is set up:
    # return 301 https://$host$request_uri;

    # Comment out the block below once SSL is configured ↓
    include /etc/nginx/conf.d/proxy.conf;
}

