global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'nodepress-backend'
    static_configs:
      - targets: ['backend:3000']
    metrics_path: '/api/metrics'
    # If METRICS_TOKEN is set in backend env, uncomment and set the token:
    # authorization:
    #   credentials: 'your_token_here'
